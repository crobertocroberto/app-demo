<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrasys - Gestión de Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0d47a1, #1565c0);
        }
        .table th {
            background-color: #e8eaf6;
            border: none;
        }
        .hero {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-building"></i> Terrasys
    </span>
    <span class="text-white-50 small">Demo CI/CD Pipeline</span>
</nav>

<div class="hero text-center">
    <h2><i class="bi bi-people-fill"></i> Gestión de Empleados</h2>
    <p class="mb-0 opacity-75">Sistema CRUD - Demo con almacenamiento en memoria</p>
</div>

<div class="container">
    <!-- Alert messages -->
    <div id="alertContainer"></div>

    <div class="row">
        <!-- Form -->
        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h5 class="mb-3" id="formTitle">
                    <i class="bi bi-person-plus"></i> Nuevo Empleado
                </h5>
                <form id="employeeForm">
                    <input type="hidden" id="employeeId">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="apellido" class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="apellido" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="cargo" class="form-label">Cargo</label>
                        <input type="text" class="form-control" id="cargo" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <button type="button" class="btn btn-outline-secondary d-none" id="cancelBtn" onclick="cancelEdit()">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="col-md-8 mb-4">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0"><i class="bi bi-list-ul"></i> Empleados</h5>
                    <span class="badge bg-primary" id="employeeCount">0</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Cargo</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTable">
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4 d-none">
                    <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                    <p class="mt-2">No hay empleados registrados</p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4">
    <small>Terrasys &copy; 2025 - Demo CI/CD con Jenkins, Docker & Vault</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = '/api/employees';

    document.addEventListener('DOMContentLoaded', loadEmployees);
    document.getElementById('employeeForm').addEventListener('submit', handleSubmit);

    async function loadEmployees() {
        try {
            const res = await fetch(API_URL);
            const employees = await res.json();
            renderTable(employees);
        } catch (err) {
            showAlert('Error al cargar empleados', 'danger');
        }
    }

    function renderTable(employees) {
        const tbody = document.getElementById('employeeTable');
        const emptyState = document.getElementById('emptyState');
        const count = document.getElementById('employeeCount');

        count.textContent = employees.length;

        if (employees.length === 0) {
            tbody.innerHTML = '';
            emptyState.classList.remove('d-none');
            return;
        }

        emptyState.classList.add('d-none');
        tbody.innerHTML = employees.map(emp => `
            <tr>
                <td><span class="badge bg-secondary">${emp.id}</span></td>
                <td><strong>${emp.nombre}</strong> ${emp.apellido}</td>
                <td>${emp.email}</td>
                <td>${emp.cargo}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editEmployee(${emp.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee(${emp.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const id = document.getElementById('employeeId').value;
        const employee = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            email: document.getElementById('email').value,
            cargo: document.getElementById('cargo').value
        };

        try {
            if (id) {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(employee)
                });
                showAlert('Empleado actualizado correctamente', 'success');
            } else {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(employee)
                });
                showAlert('Empleado creado correctamente', 'success');
            }
            resetForm();
            loadEmployees();
        } catch (err) {
            showAlert('Error al guardar empleado', 'danger');
        }
    }

    async function editEmployee(id) {
        try {
            const res = await fetch(`${API_URL}/${id}`);
            const emp = await res.json();

            document.getElementById('employeeId').value = emp.id;
            document.getElementById('nombre').value = emp.nombre;
            document.getElementById('apellido').value = emp.apellido;
            document.getElementById('email').value = emp.email;
            document.getElementById('cargo').value = emp.cargo;

            document.getElementById('formTitle').innerHTML = '<i class="bi bi-pencil-square"></i> Editar Empleado';
            document.getElementById('submitBtn').innerHTML = '<i class="bi bi-check-circle"></i> Actualizar';
            document.getElementById('cancelBtn').classList.remove('d-none');
        } catch (err) {
            showAlert('Error al cargar empleado', 'danger');
        }
    }

    async function deleteEmployee(id) {
        if (!confirm('¿Estás seguro de eliminar este empleado?')) return;

        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            showAlert('Empleado eliminado', 'warning');
            loadEmployees();
        } catch (err) {
            showAlert('Error al eliminar empleado', 'danger');
        }
    }

    function cancelEdit() {
        resetForm();
    }

    function resetForm() {
        document.getElementById('employeeForm').reset();
        document.getElementById('employeeId').value = '';
        document.getElementById('formTitle').innerHTML = '<i class="bi bi-person-plus"></i> Nuevo Empleado';
        document.getElementById('submitBtn').innerHTML = '<i class="bi bi-save"></i> Guardar';
        document.getElementById('cancelBtn').classList.add('d-none');
    }

    function showAlert(message, type) {
        const container = document.getElementById('alertContainer');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type} alert-dismissible fade show`;
        alert.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        container.appendChild(alert);
        setTimeout(() => alert.remove(), 3000);
    }
</script>

</body>
</html>
